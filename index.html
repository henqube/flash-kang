<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flash Kang — Game Artist</title>
  <meta name="description" content="2002년 스틱 하나에서 시작한 게임 아티스트. OCTOPO VFX 총괄 리드." />
  <meta name="keywords" content="Flash Kang, OCTOPO, VFX, 게임 아티스트, 2D VFX, 핸드드로잉, 브롤스타즈, 데스티니차일드, 강성훈" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;700&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --black: #0a0a0a; --white: #f0ede8; --accent: #ff3c00; }
    html, body { width: 100%; background: var(--black); color: var(--white); font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; cursor: none; }

    /* CURSOR */
    .cursor { position: fixed; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
    .cursor-ring { position: fixed; width: 36px; height: 36px; border: 1px solid rgba(255,60,0,0.5); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: width 0.2s, height 0.2s; }

    /* HERO */
    .hero { position: relative; width: 100vw; height: 100vh; overflow: hidden; display: flex; align-items: flex-end; }
   .hero-bg { position: absolute; inset: 0; overflow: hidden; background: #0a0a0a; }
    .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.2) 60%, transparent 100%); }
    .hero-content { position: relative; z-index: 2; padding: 0 6vw 6vh; width: 100%; }
    .hero-tag { font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 0.3em; color: var(--accent); text-transform: uppercase; margin-bottom: 1rem; min-height: 1em; opacity: 0; animation: fadeUp 0.8s 0.3s forwards; }
    .hero-name { font-family: 'Bebas Neue', sans-serif; font-size: clamp(5rem, 13vw, 14rem); line-height: 0.88; color: var(--white); min-height: 1em; opacity: 0; animation: fadeUp 0.9s 0.5s forwards; }
    .hero-name .accent { color: var(--accent); }
    .hero-sub { margin-top: 1.5rem; font-size: clamp(0.85rem, 1.2vw, 1rem); font-weight: 300; color: rgba(240,237,232,0.5); letter-spacing: 0.05em; min-height: 1em; opacity: 0; animation: fadeUp 0.9s 0.75s forwards; }
    .scroll-hint { position: absolute; bottom: 2.5rem; right: 6vw; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; opacity: 0; animation: fadeIn 1s 1.5s forwards; }
    .scroll-hint span { font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.25em; color: rgba(255,255,255,0.25); writing-mode: vertical-rl; }
    .scroll-line { width: 1px; height: 60px; background: linear-gradient(to bottom, var(--accent), transparent); animation: scrollPulse 2s 2s infinite; }

    /* SECTION COMMON */
    .section-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.4em; color: var(--accent); text-transform: uppercase; margin-bottom: 3rem; }
    .fade-item { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .fade-item.visible { opacity: 1; transform: translateY(0); }

    /* ABOUT */
    .about { padding: 14vh 6vw; max-width: 1200px; margin: 0 auto;border-top: 1px solid rgba(255,255,255,0.06);  }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6vw; align-items: start; }
    .about-headline { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 5vw, 5rem); line-height: 1.0; color: var(--white); min-height: 1em; }
    .about-headline .hl { color: var(--accent); }
    .about-body { font-size: 0.95rem; line-height: 1.9; color: rgba(240,237,232,0.65); font-weight: 300; }
    .about-body p + p { margin-top: 1.2rem; }
    .about-body .em { color: var(--white); font-weight: 700; }
    .about-footline { margin-top: 2rem; font-family: 'Space Mono', monospace; font-size: 0.75rem; color: rgba(255,60,0,0.7); letter-spacing: 0.1em; }

    /* TIMELINE */
    .timeline { padding: 8vh 6vw; border-top: 1px solid rgba(255,255,255,0.06); max-width: 1200px; margin: 0 auto; }
    .timeline-item { display: grid; grid-template-columns: 140px 1fr; gap: 3vw; padding: 2rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); transition: border-color 0.3s; }
    .timeline-item:hover { border-color: rgba(255,60,0,0.3); }
    .timeline-year { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: rgba(255,255,255,0.15); transition: color 0.3s; line-height: 1.2; }
    .timeline-item:hover .timeline-year { color: var(--accent); }
    .timeline-desc { font-size: 0.9rem; color: rgba(240,237,232,0.55); line-height: 1.7; padding-top: 0.3rem; }
    .timeline-desc strong { color: var(--white); display: block; margin-bottom: 0.2rem; font-size: 1rem; }

    /* WORKS */
    .works { padding: 14vh 6vw; }
    .works-inner { max-width: 1200px; margin: 0 auto; }
    .works-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 4rem; }
    .works-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 5vw, 5rem); color: var(--white); }
    .works-note { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: rgba(255,255,255,0.25); text-align: right; line-height: 1.6; }
    .works-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .work-card { position: relative; aspect-ratio: 4/5; background: #111; overflow: hidden; cursor: none; }
    .work-card-bg { position: absolute; inset: 0; background: linear-gradient(135deg, #1a0500, #0d0d0d); display: flex; align-items: center; justify-content: center; }
    .work-card-bg span { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: rgba(255,255,255,0.08); letter-spacing: 0.15em; text-align: center; padding: 0 1rem; }
    .work-card-thumb { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .work-card-inner { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 1.5rem; background: linear-gradient(to top, rgba(10,10,10,0.92) 0%, transparent 60%); opacity: 0; transition: opacity 0.4s; }
    .work-card:hover .work-card-inner { opacity: 1; }
    .work-card-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--white); }
    .work-card-meta { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--accent); letter-spacing: 0.15em; margin-top: 0.3rem; }
    .work-card-btn { margin-top: 0.8rem; display: inline-block; padding: 0.4rem 1rem; border: 1px solid rgba(255,255,255,0.3); font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.15em; color: var(--white); transition: border-color 0.3s; }
    .work-card:hover .work-card-btn { border-color: var(--accent); }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(10,10,10,0.96); display: none; justify-content: center; overflow-y: auto; padding: 4rem 2rem; }
    .modal-overlay.active { display: flex; }
    .modal-box { width: 100%; max-width: 800px; background: #111; padding: 3rem; position: relative; height: fit-content; }
    .modal-close { position: absolute; top: 1.5rem; right: 1.5rem; font-family: 'Space Mono', monospace; font-size: 0.7rem; color: rgba(255,255,255,0.4); cursor: none; letter-spacing: 0.2em; background: none; border: none; transition: color 0.3s; }
    .modal-close:hover { color: var(--accent); }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--white); margin-bottom: 0.5rem; }
    .modal-meta { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--accent); letter-spacing: 0.2em; margin-bottom: 2rem; }
    .modal-body { font-size: 0.9rem; line-height: 1.9; color: rgba(240,237,232,0.7); }
    .modal-body img { width: 100%; margin: 1.5rem 0; display: block; }
    .modal-body p { margin-bottom: 1rem; }
    .modal-body h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--white); margin: 2rem 0 1rem; }
    .modal-body h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--white); margin: 1.5rem 0 0.8rem; }
    .modal-body li { padding-left: 1rem; border-left: 2px solid var(--accent); margin: 0.5rem 0; list-style: none; }

    /* PROCESS */
    .process { padding: 14vh 6vw; border-top: 1px solid rgba(255,255,255,0.06); max-width: 1200px; margin: 0 auto; }
    .process-intro { display: grid; grid-template-columns: 1fr 1fr; gap: 6vw; margin-bottom: 4rem; align-items: start; }
    .process-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 5vw, 5rem); color: var(--white); line-height: 1.0; min-height: 1em; }
    .process-desc { font-size: 0.9rem; color: rgba(240,237,232,0.55); line-height: 1.9; font-weight: 300; min-height: 1em; }
    .process-steps { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
    .process-step { padding: 2.5rem 1.5rem; background: #111; position: relative; overflow: hidden; transition: background 0.3s; }
    .process-step:hover { background: #161616; }
    .process-step::before { content: ''; position: absolute; top: 0; left: 0; width: 2px; height: 0; background: var(--accent); transition: height 0.4s; }
    .process-step:hover::before { height: 100%; }
    .step-num { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; color: rgba(255,255,255,0.05); line-height: 1; margin-bottom: 1rem; }
    .step-title { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.8rem; }
    .step-desc { font-size: 0.82rem; color: rgba(240,237,232,0.5); line-height: 1.7; font-weight: 300; }

    /* CONTACT */
    .contact { padding: 16vh 6vw; border-top: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; align-items: center; text-align: center; }
    .contact-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.4em; color: var(--accent); text-transform: uppercase; margin-bottom: 2rem; }
    .contact-headline { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 8vw, 9rem); line-height: 0.9; color: var(--white); margin-bottom: 2rem; min-height: 1em; }
    .contact-sub { font-size: 0.9rem; color: rgba(240,237,232,0.45); line-height: 1.8; max-width: 480px; font-weight: 300; margin-bottom: 3.5rem; min-height: 1em; }
    .contact-btn { display: inline-flex; align-items: center; gap: 1rem; padding: 1.1rem 2.5rem; border: 1px solid var(--accent); color: var(--white); text-decoration: none; font-family: 'Space Mono', monospace; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; transition: background 0.3s, color 0.3s; cursor: none; }
    .contact-btn:hover { background: var(--accent); color: var(--black); }
    .contact-note { margin-top: 2rem; font-family: 'Space Mono', monospace; font-size: 0.6rem; color: rgba(255,255,255,0.2); letter-spacing: 0.15em; min-height: 1em; }

    /* FOOTER */
    footer { padding: 2.5rem 6vw; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
    .footer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: rgba(255,255,255,0.2); min-height: 1em; }
    .footer-copy { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: rgba(255,255,255,0.15); letter-spacing: 0.1em; min-height: 1em; }

    /* ANIMATIONS */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scrollPulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

    /* RESPONSIVE */
    @media (max-width: 900px) { .process-steps { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px) {
      .about-grid, .process-intro { grid-template-columns: 1fr; }
      .works-grid { grid-template-columns: 1fr 1fr; }
      .works-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .timeline-item { grid-template-columns: 100px 1fr; }
    }
    @media (max-width: 480px) {
      .works-grid { grid-template-columns: 1fr; }
      .process-steps { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- HERO -->
  <section class="hero">
  <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <p class="hero-tag" id="hero-tag"></p>
      <h1 class="hero-name" id="hero-name"></h1>
      <p class="hero-sub" id="hero-sub"></p>
    </div>
    <div class="scroll-hint">
      <span>Scroll</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- ABOUT -->
  <section class="about">
    <p class="section-label">About</p>
    <div class="about-grid fade-item">
      <div class="about-headline" id="about-headline"></div>
      <div class="about-body" id="about-body"></div>
    </div>
  </section>

  <!-- TIMELINE -->
  <section class="timeline">
    <p class="section-label">Timeline</p>
    <div id="timeline-list"></div>
  </section>

  <!-- WORKS -->
  <section class="works">
    <div class="works-inner">
      <div class="works-header fade-item">
        <h2 class="works-title">Works</h2>
      </div>
      <div class="works-grid" id="works-grid"></div>
    </div>
  </section>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <button class="modal-close" id="modal-close">✕ CLOSE</button>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- PROCESS -->
  <section class="process">
    <p class="section-label">How I Work</p>
    <div class="process-intro fade-item">
      <h2 class="process-title" id="process-title"></h2>
      <p class="process-desc" id="process-desc"></p>
    </div>
    <div class="process-steps" id="process-steps"></div>
  </section>

  <!-- CONTACT -->
  <section class="contact">
    <p class="contact-label">Contact</p>
    <h2 class="contact-headline fade-item" id="contact-headline"></h2>
    <p class="contact-sub" id="contact-sub"></p>
    <a href="#" class="contact-btn" id="contact-btn" target="_blank">Instagram DM <span>→</span></a>
    <p class="contact-note" id="contact-note"></p>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo" id="footer-logo"></div>
    <div class="footer-copy" id="footer-copy"></div>
  </footer>

  <script>
    // ── 커서 ──
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx=0, my=0, rx=0, ry=0;
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cursor.style.left=mx+'px'; cursor.style.top=my+'px'; });
    (function animRing(){ rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(animRing); })();
    document.querySelectorAll('a,button').forEach(el=>{
      el.addEventListener('mouseenter',()=>{ ring.style.width='60px'; ring.style.height='60px'; });
      el.addEventListener('mouseleave',()=>{ ring.style.width='36px'; ring.style.height='36px'; });
    });

    // ── 스크롤 옵저버 ──
    const observer = new IntersectionObserver(entries=>{
      entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-item').forEach(el => observer.observe(el));

    // ── 파싱 헬퍼 ──
    const parseHL = t => t.replace(/<([^>]+)>/g, '<span class="hl">$1</span>');
    const parseEM = t => t.replace(/<([^>]+)>/g, '<span class="em">$1</span>');

    // ── 노션 API ──
    async function fetchDB(db) {
      const r = await fetch('/api/notion?db='+db);
      const d = await r.json();
      return d.results || [];
    }

    function val(row, key) {
      const p = row.properties[key];
      if (!p) return '';
      if (p.title)   return p.title.map(t=>t.plain_text).join('');
      if (p.rich_text) return p.rich_text.map(t=>t.plain_text).join('');
      if (p.number !== undefined && p.number !== null) return p.number;
      if (p.checkbox !== undefined) return p.checkbox;
      if (p.files && p.files.length) return p.files[0]?.file?.url || p.files[0]?.external?.url || '';
      return '';
    }

    function find(rows, key, value) {
      return rows.find(r => String(val(r, key)) === String(value)) || null;
    }

    // ── TITLE ──
   async function loadTitle() {
  try {
    const rows = await fetchDB('title');
    const get = k => { const r = find(rows,'key',k); return r ? val(r,'value') : ''; };
    const tag=get('tag'), name=get('name'), sub=get('sub');
    const heroVideo=get('hero_video');

    if (tag) document.getElementById('hero-tag').textContent = tag;
    if (name) {
      const p = name.split(' ');
      document.getElementById('hero-name').innerHTML = p[0]+'<br><span class="accent">'+p.slice(1).join(' ')+'</span>';
    }
    if (sub) document.getElementById('hero-sub').textContent = sub;

    // 유튜브 URL에서 ID 추출
    if (heroVideo) {
      const match = heroVideo.match(/[?&]v=([^&]+)/);
      const videoId = match ? match[1] : null;
      if (videoId) {
        const iframe = document.createElement('iframe');
        iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}&controls=0&showinfo=0&rel=0&modestbranding=1&playsinline=1`;
        iframe.frameBorder = '0';
        iframe.allow = 'autoplay; fullscreen';
        iframe.style.cssText = 'position:absolute;top:50%;left:50%;width:177.78vh;min-width:100%;height:56.25vw;min-height:100%;transform:translate(-50%,-50%);pointer-events:none;opacity:0.6;';
        document.querySelector('.hero-bg').appendChild(iframe);
      }
    }
  } catch(e) { console.error('TITLE',e); }
}

    // ── ABOUT ──
    async function loadAbout() {
      try {
        const rows = await fetchDB('about');
        const get = k => { const r = find(rows,'key',k); return r ? val(r,'value') : ''; };
        const headline = get('headline');
        if (headline) document.getElementById('about-headline').innerHTML = parseHL(headline);
        let html = '';
        ['body1','body2','body3','body4'].forEach(k=>{ const v=get(k); if(v) html+=`<p>${parseEM(v)}</p>`; });
        const fl = get('footline');
        if (fl) html += `<p class="about-footline">${fl}</p>`;
        document.getElementById('about-body').innerHTML = html;
      } catch(e) { console.error('ABOUT',e); }
    }

    // ── TIMELINE ──
    async function loadTimeline() {
      try {
        const rows = await fetchDB('timeline');
        const list = document.getElementById('timeline-list');
        list.innerHTML = '';
        rows.forEach(row => {
          const year=val(row,'year'), title=val(row,'title'), text=val(row,'text');
          const el = document.createElement('div');
          el.className = 'timeline-item fade-item';
          el.innerHTML = `<div class="timeline-year">${year}</div><div class="timeline-desc"><strong>${title}</strong>${text}</div>`;
          list.appendChild(el);
          observer.observe(el);
        });
      } catch(e) { console.error('TIMELINE',e); }
    }

    // ── WORKS ──
    async function loadWorks() {
      try {
        const rows = await fetchDB('works');
        const grid = document.getElementById('works-grid');
        grid.innerHTML = '';
        rows.forEach(row => {
          const title=val(row,'title'), thumb=val(row,'thumb'), text=val(row,'text'), visible=val(row,'visible');
          if (visible === false) return;
          const el = document.createElement('div');
          el.className = 'work-card fade-item';
          el.innerHTML = `
            ${thumb ? `<img class="work-card-thumb" src="${thumb}" alt="${title}">` : `<div class="work-card-bg"><span>${title}</span></div>`}
            <div class="work-card-inner">
              <div class="work-card-title">${title}</div>
              <div class="work-card-meta">${text}</div>
              <div class="work-card-btn">VIEW WORK →</div>
            </div>`;
          el.addEventListener('click', () => openModal(row.id, title, text));
          grid.appendChild(el);
          observer.observe(el);
        });
      } catch(e) { console.error('WORKS',e); }
    }

    // ── MODAL ──
    async function openModal(pageId, title, meta) {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-meta').textContent = meta;
      document.getElementById('modal-body').innerHTML = '<p style="font-family:Space Mono,monospace;font-size:0.7rem;color:rgba(255,255,255,0.3);letter-spacing:0.2em;padding:2rem 0">Loading...</p>';
      document.getElementById('modal').classList.add('active');
      document.body.style.overflow = 'hidden';
      try {
        const r = await fetch('/api/notion?pageId='+pageId);
        const d = await r.json();
        let html = '';
        (d.results||[]).forEach(block => {
          const type=block.type, c=block[type];
          if (!c) return;
          const txt = arr => (arr||[]).map(t=>t.plain_text).join('');
          if (type==='paragraph') html+=`<p>${txt(c.rich_text)}</p>`;
          else if (type==='heading_1') html+=`<h2>${txt(c.rich_text)}</h2>`;
          else if (type==='heading_2') html+=`<h3>${txt(c.rich_text)}</h3>`;
          else if (type==='image') { const url=c.type==='file'?c.file.url:c.external.url; html+=`<img src="${url}" alt="">`; }
          else if (type==='bulleted_list_item') html+=`<li>${txt(c.rich_text)}</li>`;
          else if (type==='divider') html+=`<hr style="border:none;border-top:1px solid rgba(255,255,255,0.1);margin:2rem 0">`;
else if (type==='column_list') {
  const colRes = await fetch('/api/notion?pageId='+block.id);
  const colData = await colRes.json();
  let colHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;margin:1.5rem 0">';
  for (const col of colData.results||[]) {
    const colBlocks = await fetch('/api/notion?pageId='+col.id);
    const colBlockData = await colBlocks.json();
    colHtml += '<div>';
    for (const b of colBlockData.results||[]) {
      const bc = b[b.type];
      if (!bc) continue;
      const t = arr => (arr||[]).map(x=>x.plain_text).join('');
      if (b.type==='paragraph') colHtml+=`<p style="margin-bottom:0.8rem">${t(bc.rich_text)}</p>`;
      else if (b.type==='image') { const u=bc.type==='file'?bc.file.url:bc.external.url; colHtml+=`<img src="${u}" alt="" style="width:100%;margin-bottom:0.8rem">`; }
      else if (b.type==='heading_1') colHtml+=`<h2 style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--white);margin-bottom:0.5rem">${t(bc.rich_text)}</h2>`;
      else if (b.type==='heading_2') colHtml+=`<h3 style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--white);margin-bottom:0.5rem">${t(bc.rich_text)}</h3>`;
    }
    colHtml += '</div>';
  }
  colHtml += '</div>';
  html += colHtml;
}
        });
        document.getElementById('modal-body').innerHTML = html || '<p>내용이 없습니다.</p>';
      } catch(e) { document.getElementById('modal-body').innerHTML='<p>로드 실패</p>'; }
    }
    document.getElementById('modal-close').addEventListener('click', ()=>{ document.getElementById('modal').classList.remove('active'); document.body.style.overflow=''; });
    document.getElementById('modal').addEventListener('click', e=>{ if(e.target.id==='modal'){ document.getElementById('modal').classList.remove('active'); document.body.style.overflow=''; } });

    // ── PROCESS ──
    async function loadProcess() {
      try {
        const rows = await fetchDB('process');
        const hlRow = rows.find(r => val(r,'num') === 'headline');
        if (hlRow) {
          document.getElementById('process-title').innerHTML = val(hlRow,'title').replace(/\n/g,'<br>');
          document.getElementById('process-desc').textContent = val(hlRow,'text');
        }
        const stepRows = rows.filter(r => val(r,'num') !== 'headline');
        const steps = document.getElementById('process-steps');
        steps.innerHTML = '';
        stepRows.forEach(row => {
          const num=val(row,'num'), title=val(row,'title'), text=val(row,'text');
          const el = document.createElement('div');
          el.className = 'process-step fade-item';
          el.innerHTML = `<div class="step-num">${num}</div><div class="step-title">${title}</div><div class="step-desc">${text}</div>`;
          steps.appendChild(el);
          observer.observe(el);
        });
      } catch(e) { console.error('PROCESS',e); }
    }

    // ── CONTACT ──
    async function loadContact() {
      try {
        const rows = await fetchDB('contact');
        const get = k => { const r = find(rows,'key',k); return r ? val(r,'value') : ''; };
        const headline=get('headline'), sub=get('sub'), ig=get('instagram');
        if (headline) document.getElementById('contact-headline').innerHTML = headline.replace(/\n/g,'<br>');
        if (sub) document.getElementById('contact-sub').textContent = sub;
        if (ig) {
          document.getElementById('contact-btn').href = 'https://instagram.com/'+ig.replace('@','');
          document.getElementById('contact-note').textContent = ig+' · Instagram';
        }
      } catch(e) { console.error('CONTACT',e); }
    }

    // ── FOOTER ──
    async function loadFooter() {
      try {
        const rows = await fetchDB('footer');
        const get = k => { const r = find(rows,'key',k); return r ? val(r,'value') : ''; };
        const logo=get('logo'), copy=get('copy');
        if (logo) document.getElementById('footer-logo').textContent = logo;
        if (copy) document.getElementById('footer-copy').textContent = copy;
      } catch(e) { console.error('FOOTER',e); }
    }

    // ── 전체 로드 ──
    loadTitle();
    loadAbout();
    loadTimeline();
    loadWorks();
    loadProcess();
    loadContact();
    loadFooter();
  </script>
</body>
</html>
